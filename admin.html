<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — LA DOCE</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <div id="navbar-placeholder"></div>

    <main class="admin-container">
        <div class="admin-header reveal active">
            <h1>Gestión de <span class="accent">Productos</span></h1>
            <button onclick="logout()" class="btn" style="background: var(--color-red);">Cerrar Sesión</button>
        </div>

        <section class="admin-card reveal active">
            <h2>Añadir Nuevo Producto</h2>
            <form id="add-product-form" class="form-add-product" style="margin-top: 1.5rem;">
                <div class="form-group">
                    <label>Nombre del Producto</label>
                    <input type="text" id="p-name" required placeholder="Ej: Elite Shorts">
                </div>
                <div class="form-group">
                    <label>Precio (S/)</label>
                    <input type="number" step="0.01" id="p-price" required placeholder="99.99">
                </div>
                <div class="form-group full-width">
                    <label>Descripción</label>
                    <textarea id="p-desc" rows="2" required placeholder="Breve descripción del producto..."></textarea>
                </div>
                <div class="form-group full-width">
                    <label>URL de la Imagen (o subir a Supabase)</label>
                    <input type="text" id="p-img" required placeholder="https://example.com/image.png">
                </div>
                <button type="submit" class="btn">Guardar Producto</button>
            </form>
        </section>

        <section class="admin-card reveal active">
            <h2>Inventario Actual</h2>
            <div style="overflow-x: auto; margin-top: 1.5rem;">
                <table class="product-list">
                    <thead>
                        <tr>
                            <th>Imagen</th>
                            <th>Nombre</th>
                            <th>Precio</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="admin-product-list">
                        <!-- Products will appear here -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Core Scripts -->
    <script src="static/js/loader.js"></script>
    <script src="static/js/theme.js"></script>
    <script src="static/js/supabase-config.js"></script>
    <script src="static/js/admin.js"></script>
</body>

</html>
