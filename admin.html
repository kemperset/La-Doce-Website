<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — LA DOCE</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <div id="navbar-placeholder"></div>

    <main class="admin-container">
        <div class="admin-header reveal active">
            <h1>Gestión de <span class="accent">Productos</span></h1>
            <button onclick="logout()" class="btn" style="background: var(--color-red);">Cerrar Sesión</button>
        </div>

        <section class="admin-card reveal active">
            <h2>Añadir Nuevo Producto</h2>
            <form id="add-product-form" class="form-add-product" style="margin-top: 1.5rem;">
                <div class="form-group">
                    <label>Nombre del Producto</label>
                    <input type="text" id="p-name" required placeholder="Ej: Elite Shorts">
                </div>
                <div class="form-group">
                    <label>Precio (S/)</label>
                    <input type="number" step="0.01" id="p-price" required placeholder="99.99">
                </div>
                <div class="form-group">
                    <label>Stock Inicial</label>
                    <input type="number" id="p-stock" required placeholder="0">
                </div>
                <div class="form-group full-width">
                    <label>Descripción</label>
                    <textarea id="p-desc" rows="2" required placeholder="Breve descripción del producto..."></textarea>
                </div>
                <div class="form-group full-width">
                    <label>Tallas Disponibles (Separadas por comas)</label>
                    <input type="text" id="p-sizes" placeholder="Ej: 38, 39, 40, 42">
                </div>
                <div class="form-group full-width">
                    <label>URL de la Imagen (o subir a Supabase)</label>
                    <input type="text" id="p-img" required placeholder="https://example.com/image.png">
                    <div id="image-preview" class="image-preview-box">
                        <p>Vista previa aparecerá aquí</p>
                    </div>
                </div>
                <button type="submit" class="btn">Guardar Producto</button>
            </form>
        </section>

        <section class="admin-card reveal active">
            <h2>Inventario Actual</h2>
            
            <div class="inventory-controls">
                <div class="search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="inventory-search" placeholder="Buscar por nombre o talla...">
                </div>
            </div>

            <div style="overflow-x: auto; margin-top: 0.5rem;">
                <table class="product-list">
                    <thead>
                        <tr>
                            <th>Imagen</th>
                            <th>Nombre</th>
                            <th>Precio</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="admin-product-list">
                        <!-- Products will appear here -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- EDIT MODAL -->
    <div id="edit-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h2>Editar <span class="accent">Producto</span></h2>
                <button class="close-modal" onclick="closeModal('edit-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="edit-product-form" class="form-add-product">
                    <input type="hidden" id="edit-p-id">
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" id="edit-p-name" required>
                    </div>
                    <div class="form-group">
                        <label>Precio (S/)</label>
                        <input type="number" step="0.01" id="edit-p-price" required>
                    </div>
                    <div class="form-group">
                        <label>Stock</label>
                        <input type="number" id="edit-p-stock" required>
                    </div>
                    <div class="form-group full-width">
                        <label>Tallas</label>
                        <input type="text" id="edit-p-sizes">
                    </div>
                    <div class="form-group full-width">
                        <label>Descripción</label>
                        <textarea id="edit-p-desc" rows="2" required></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label>Imagen URL</label>
                        <input type="text" id="edit-p-img" required>
                    </div>
                    <button type="submit" class="btn full-width">Actualizar Producto</button>
                </form>
            </div>
        </div>
    </div>

    <!-- DETAILS MODAL -->
    <div id="details-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h2>Detalles de <span class="accent">Ingreso</span></h2>
                <button class="close-modal" onclick="closeModal('details-modal')">&times;</button>
            </div>
            <div id="details-content" class="modal-body">
                <!-- Details will be loaded here -->
            </div>
            <button onclick="closeModal('details-modal')" class="btn full-width" style="margin-top: 1.5rem;">Cerrar</button>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Core Scripts -->
    <script src="static/js/loader.js"></script>
    <script src="static/js/theme.js"></script>
    <script src="static/js/supabase-config.js"></script>
    <script src="static/js/admin.js"></script>
</body>

</html>
