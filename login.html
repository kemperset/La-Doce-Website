<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin — LA DOCE</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <div id="navbar-placeholder"></div>

    <main class="login-container">
        <div class="login-card reveal active">
            <h1>Acceso <span class="accent">Admin</span></h1>
            
            <div id="login-error" role="alert"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••">
                    <button type="button" class="password-toggle" id="togglePassword" title="Mostrar/Ocultar contraseña">👁️</button>
                </div>
                <button type="submit" class="btn btn-login" id="submit-btn">Ingresar al Panel</button>
            </form>
            
            <p style="text-align: center; margin-top: 2rem; font-size: 0.85rem;">
                <a href="index.html" style="color: var(--text-secondary); text-decoration: none;">← Volver al inicio</a>
            </p>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="static/js/loader.js"></script>
    <script src="static/js/theme.js"></script>
    <script src="static/js/supabase-config.js"></script>
    
    <script>
        // Toggle Password Visibility
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function (e) {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.textContent = type === 'password' ? '👁️' : '🔒';
        });

        // Login Logic
        const loginForm = document.getElementById('login-form');
        const errorElement = document.getElementById('login-error');
        const submitBtn = document.getElementById('submit-btn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const passwordValue = document.getElementById('password').value;

            // Reset UI
            errorElement.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Verificando...';

            try {
                const { data, error } = await db.auth.signInWithPassword({
                    email: email,
                    password: passwordValue,
                });

                if (error) {
                    throw error;
                }

                if (data.user) {
                    window.location.href = 'admin.html';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorElement.textContent = '⚠️ Error: ' + (error.message === 'Invalid login credentials' ? 'Correo o contraseña incorrectos.' : error.message);
                errorElement.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Ingresar al Panel';
            }
        });

        // Redirect if already logged in
        async function checkSession() {
            try {
                const { data: { session } } = await db.auth.getSession();
                if (session) {
                    window.location.href = 'admin.html';
                }
            } catch (e) {
                console.error('Session check failed', e);
            }
        }
        checkSession();
    </script>
</body>

</html>
